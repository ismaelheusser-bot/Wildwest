<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#14100D">
<title>Dusty Gulch – Arcade</title>
<style>
:root{
  --nacht:#14100D;
  --nacht-2:#1F1811;
  --sand:#E8C88E;
  --sand-2:#B9A180;
  --rost:#B5533F;
  --gold:#E8A33D;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0}
#grund{position:fixed;inset:0;z-index:-1;background:var(--nacht)}
body{
  font-family:var(--sans);color:var(--sand);background:var(--nacht);
  font-size:17px;line-height:1.5;overscroll-behavior:none;
}
#menue{
  position:relative;z-index:1;min-height:100dvh;max-width:560px;margin:0 auto;
  padding:max(24px,env(safe-area-inset-top)) 20px max(24px,env(safe-area-inset-bottom));
  display:flex;flex-direction:column;
}

.kopf{text-align:center;padding:20px 0 6px}
.kopf .stern{color:var(--rost);letter-spacing:.6em;font-size:12px}
h1{
  font-family:var(--serif);font-weight:400;font-size:44px;line-height:1;
  margin:12px 0 6px;letter-spacing:.02em;color:var(--gold);
}
.kopf p{margin:0;color:var(--sand-2);font-size:14px;letter-spacing:.18em;text-transform:uppercase}

.horizont{margin:26px -20px 8px}
.horizont svg{display:block;width:100%}

.regal{display:flex;flex-direction:column;gap:12px;margin-top:8px}
.karte{
  display:flex;gap:16px;align-items:center;text-align:left;width:100%;
  font:inherit;color:var(--sand);cursor:pointer;
  background:linear-gradient(180deg,rgba(232,200,142,.09),rgba(232,200,142,.04));
  border:1px solid rgba(232,200,142,.22);border-radius:18px;padding:16px;
  transition:transform 120ms ease,border-color 160ms ease;
}
.karte:active{transform:scale(.99)}
.karte:hover{border-color:rgba(232,163,61,.6)}
.karte .bild{width:62px;height:62px;flex:none;border-radius:14px;overflow:hidden;background:#0F0B08}
.karte .bild svg{display:block;width:100%;height:100%}
.karte b{display:block;font-family:var(--serif);font-size:20px;font-weight:400;letter-spacing:.01em}
.karte small{display:block;color:var(--sand-2);font-size:14px;margin-top:3px;line-height:1.35}
.karte .marke{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-top:6px}

footer{margin-top:auto;padding-top:26px;color:var(--sand-2);font-size:13px;text-align:center}
footer a{color:var(--sand-2)}

/* Vollbild für die Spiele */
#vollbild{position:fixed;inset:0;z-index:200;background:#0A0806;display:flex;flex-direction:column}
#vollbild iframe{flex:1;width:100%;border:0;display:block}
#vollbild .leiste{
  position:absolute;top:max(8px,env(safe-area-inset-top));left:0;right:0;z-index:5;
  display:flex;justify-content:space-between;align-items:center;padding:0 12px;pointer-events:none;
}
#vollbild .leiste span{
  font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);
  background:rgba(0,0,0,.55);padding:6px 12px;border-radius:999px;
}
#vollbild .leiste button{
  pointer-events:auto;font:inherit;font-size:14px;font-weight:600;color:#F5F1E8;
  background:rgba(0,0,0,.6);border:0;border-radius:999px;padding:8px 16px;cursor:pointer;
}

.infobtn{
  position:absolute;right:12px;bottom:10px;
  font:inherit;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--sand-2);background:transparent;border:1px solid rgba(232,200,142,.28);
  border-radius:999px;padding:5px 11px;cursor:pointer;
}
.karte{position:relative}
ul.regeln{margin:8px 0 0;padding-left:20px;color:var(--sand-2);font-size:15px;line-height:1.55}
ul.regeln li{margin:5px 0}
#losbtn{
  margin-top:28px;width:100%;font:inherit;font-size:16px;font-weight:600;
  background:var(--gold);color:#1A1209;border:0;border-radius:14px;padding:15px;cursor:pointer;
}
.gruppe{font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold);font-weight:600;margin-top:24px}
#tafel{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tafelinhalt{
  max-width:520px;margin:0 auto;
  padding:calc(max(8px,env(safe-area-inset-top)) + 56px) 20px max(24px,env(safe-area-inset-bottom));
}
.tafelinhalt h2{font-family:var(--serif);font-weight:400;font-size:24px;color:var(--gold);margin:26px 0 10px}
.tafelinhalt h2:first-child{margin-top:0}
.tafelinhalt p{color:var(--sand-2);font-size:15px}
.tafelinhalt p.leer{font-style:italic}
.tafelinhalt b{color:var(--sand)}
ol.rang{list-style:none;counter-reset:r;margin:0;padding:0}
ol.rang li{
  counter-increment:r;display:flex;justify-content:space-between;gap:14px;align-items:baseline;
  padding:11px 0;border-bottom:1px solid rgba(232,200,142,.16);
}
ol.rang li::before{content:counter(r) ".";color:var(--sand-2);font-size:13px;width:26px;flex:none}
ol.rang li span{flex:1}
ol.rang li:nth-child(1) b{color:var(--gold)}
#namebtn{
  margin-top:30px;width:100%;font:inherit;font-size:15px;color:var(--sand-2);
  background:transparent;border:1px dashed rgba(232,200,142,.3);border-radius:14px;
  padding:14px;cursor:pointer;
}
/* Duell */
#duellflaeche{
  position:absolute;inset:0;display:flex;flex-direction:column;
  background:linear-gradient(#F0C777 0%,#E9B25E 46%,#C68B4C 47%,#A9713C 100%);
  cursor:pointer;user-select:none;transition:filter 120ms ease;
}
#duellflaeche.zieh{filter:contrast(1.25) saturate(1.3)}
#duellflaeche.frueh{filter:grayscale(.7)}
#duellflaeche svg{flex:1;width:100%;height:100%}
#duellflaeche #hutA,#duellflaeche #hutB{transition:transform 400ms cubic-bezier(.3,-.4,.5,1.4)}
#ruf{
  position:absolute;left:0;right:0;top:42%;text-align:center;pointer-events:none;
  font-family:var(--serif);font-size:38px;color:#2A1C15;text-shadow:0 1px 0 rgba(255,235,190,.6);
}
#duellflaeche.zieh #ruf{font-size:64px;font-weight:700}
#stand{
  position:absolute;bottom:max(14px,env(safe-area-inset-bottom));left:0;right:0;text-align:center;
  font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#3A2A1E;pointer-events:none;
}
#ende{
  position:absolute;inset:0;display:none;flex-direction:column;justify-content:center;
  align-items:center;gap:18px;background:rgba(20,16,13,.93);text-align:center;padding:30px;
}
#ende h2{font-family:var(--serif);font-weight:400;font-size:34px;color:var(--gold);margin:0}
#ende p{margin:0;color:var(--sand-2)}
#ende button{
  font:inherit;font-size:16px;font-weight:600;background:var(--gold);color:#1A1209;
  border:0;border-radius:14px;padding:15px 26px;cursor:pointer;
}
@media (prefers-reduced-motion:reduce){*{transition-duration:1ms!important}}
</style>
</head>
<body>
<div id="grund"></div>
<div id="menue">
  <div class="kopf">
    <div class="stern">★ ★ ★</div>
    <h1>Dusty Gulch</h1>
    <p>Arcade</p>
  </div>

  <div class="horizont">
    <svg viewBox="0 0 320 70" aria-hidden="true">
      <circle cx="255" cy="40" r="16" fill="#E8A33D" opacity=".28"/>
      <path d="M0 54 L40 34 L64 48 L96 22 L130 48 L168 30 L200 50 L240 36 L280 52 L320 40 L320 70 L0 70Z"
            fill="#1F1811"/>
      <g fill="#0F0B08">
        <path d="M18 62 h5 v-14 h-5z M12 52 q6-9 6 0z M29 49 q-6-10-6 0z"/>
        <path d="M296 64 h4 v-11 h-4z M291 56 q5-8 5 0z"/>
      </g>
    </svg>
  </div>

  <div class="regal" id="regal"></div>

  <footer>
    Läuft ohne Konto und ohne Werbung.<br>
    Bestzeiten bleiben nur auf diesem Gerät.
  </footer>
</div>

<!DOCTYPE html>
<html lang="de">
<head>

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {

  .lbar { position: absolute; left: 0; right: 0; height: 0; background: #000; transition: height 0.8s ease; z-index: 3; }
  #barTop { top: 0; } #barBot { bottom: 0; }
  #titleCard { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 4; pointer-events: none; }
  #t1 { font-size: 40px; letter-spacing: 9px; color: #F2E2B8; text-shadow: 0 2px 14px rgba(0,0,0,0.95); opacity: 0; transition: opacity 1s; font-weight: bold; text-align: center; }
  #t2 { font-size: 15px; letter-spacing: 5px; color: #E4CFA0; text-shadow: 0 2px 10px rgba(0,0,0,0.95); opacity: 0; transition: opacity 1s; margin-top: 12px; text-align: center; }
  #skipHint { position: absolute; bottom: calc(16px + env(safe-area-inset-bottom)); right: 18px; font-size: 12px; color: rgba(240,225,190,0.8); z-index: 5; display: none; }

  .pop { position: absolute; font-size: 20px; font-weight: bold; transform: translate(-50%,-50%); animation: popUp .8s ease-out forwards; text-shadow: 0 1px 3px rgba(0,0,0,.6); pointer-events: none; }
  @keyframes popUp { 0% { opacity: 1; margin-top: 0; } 100% { opacity: 0; margin-top: -42px; } }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"><\/script>
<script>
(function(){
  var $ = function(id){ return document.getElementById(id); };
  var wrap = $("wrap"), banner = $("banner"), overlay = $("overlay");
  var card = $("card"), cardTitle = $("cardTitle"), cardText = $("cardText"), cardTap = $("cardTap"), cardScores = $("cardScores");
  var barTop = $("barTop"), barBot = $("barBot"), tEl1 = $("t1"), tEl2 = $("t2"), skipHint = $("skipHint");

  window.addEventListener("error", function(ev){
    try { cardTitle.textContent = "FEHLER"; cardText.textContent = (ev.message || "unbekannt"); card.style.display = "flex"; } catch(e){}
  });
  if (typeof THREE === "undefined"){
    cardTitle.textContent = "OFFLINE?";
    cardText.textContent = "Die 3D-Bibliothek konnte nicht geladen werden. Bitte Internetverbindung prüfen und in Safari oder Chrome öffnen.";
    cardTap.textContent = ""; $("introBtn").style.display = "none";
    return;
  }

  var renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;
  renderer.outputEncoding = THREE.sRGBEncoding;
  $("scene").appendChild(renderer.domElement);

  var scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0xE6CFA2, 45, 130);
  var camera = new THREE.PerspectiveCamera(60, 1, 0.1, 320);
  camera.position.set(0, 3.4, 6.6);
  function resize(){
    var w = wrap.clientWidth || window.innerWidth;
    var h = wrap.clientHeight || window.innerHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", function(){ setTimeout(resize, 250); });
  resize();

  function rnd(a, b){ return a + Math.random() * (b - a); }
  function canvasTex(w, h, draw, rx, ry){
    var c = document.createElement("canvas"); c.width = w; c.height = h;
    draw(c.getContext("2d"), w, h);
    var t2 = new THREE.CanvasTexture(c);
    t2.wrapS = t2.wrapT = THREE.RepeatWrapping;
    if (rx) t2.repeat.set(rx, ry || rx);
    t2.encoding = THREE.sRGBEncoding;
    t2.anisotropy = renderer.capabilities.getMaxAnisotropy();
    return t2;
  }
  function grad(stops){
    return canvasTex(16, 512, function(g, w, h){
      var gr = g.createLinearGradient(0, 0, 0, h);
      for (var i = 0; i < stops.length; i++) gr.addColorStop(stops[i][0], stops[i][1]);
      g.fillStyle = gr; g.fillRect(0, 0, w, h);
    });
  }
  var skyDay = grad([[0,"#6FA8D6"],[0.55,"#A9CBE0"],[0.8,"#E8D3A8"],[1,"#F0DCB2"]]);
  var skyEve = grad([[0,"#3A3260"],[0.45,"#8A4E6E"],[0.72,"#D9704A"],[0.88,"#F2A54C"],[1,"#F7C878"]]);
  var skyMesh = new THREE.Mesh(new THREE.SphereGeometry(170, 24, 16), new THREE.MeshBasicMaterial({ map: skyDay, side: THREE.BackSide, fog: false }));
  scene.add(skyMesh);
  var sunBall = new THREE.Mesh(new THREE.SphereGeometry(5, 20, 20), new THREE.MeshBasicMaterial({ color: 0xFFF3C4, fog: false }));
  sunBall.position.set(45, 55, -130);
  scene.add(sunBall);
  var hemi = new THREE.HemisphereLight(0xBFD8EC, 0x9A7A4E, 0.55);
  scene.add(hemi);
  var sun = new THREE.DirectionalLight(0xFFE8C0, 1.35);
  sun.position.set(14, 26, 10);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  sun.shadow.camera.left = -18; sun.shadow.camera.right = 18;
  sun.shadow.camera.top = 18; sun.shadow.camera.bottom = -26;
  sun.shadow.bias = -0.0004;
  scene.add(sun);

  var sandT = canvasTex(512, 512, function(g, w, h){
    g.fillStyle = "#C89B62"; g.fillRect(0, 0, w, h);
    for (var i = 0; i < 8000; i++){
      var v = rnd(-18, 14);
      g.fillStyle = "rgba(" + (200+v) + "," + (155+v) + "," + (98+v) + ",0.5)";
      g.fillRect(rnd(0,w), rnd(0,h), rnd(1,2.5), rnd(1,2.5));
    }
    g.fillStyle = "rgba(220,185,130,0.5)";
    g.fillRect(w*0.26, 0, w*0.48, h);
    for (var ln = -1; ln <= 1; ln++){
      var lx = w * (0.5 + ln * 0.05);
      for (var hy = 0; hy < h; hy += 14){
        g.fillStyle = "rgba(128,94,54,0.45)";
        g.beginPath(); g.ellipse(lx - 4, hy, 2.3, 3.5, 0, 0, 7); g.fill();
        g.beginPath(); g.ellipse(lx + 4, hy + 7, 2.3, 3.5, 0, 0, 7); g.fill();
      }
    }
    for (var p = 0; p < 40; p++){
      g.fillStyle = "rgba(120,90,55," + rnd(0.3,0.5) + ")";
      g.beginPath(); g.ellipse(rnd(0,w), rnd(0,h), rnd(1.5,4), rnd(1,3), rnd(0,3), 0, 7); g.fill();
    }
  }, 1, 6);
  var woodT = canvasTex(128, 128, function(g, w, h){
    g.fillStyle = "#7A5230"; g.fillRect(0, 0, w, h);
    for (var l = 0; l < 40; l++){
      g.strokeStyle = "rgba(40,24,10," + rnd(0.1,0.35) + ")";
      g.lineWidth = rnd(0.5, 2);
      g.beginPath(); g.moveTo(0, rnd(0,h)); g.lineTo(w, rnd(0,h)); g.stroke();
    }
  }, 2, 1);
  function stdMat(tex, rough, tint){
    return new THREE.MeshStandardMaterial({ map: tex || null, roughness: rough || 0.9, metalness: 0.02, color: tint || 0xffffff });
  }
  var groundMat = stdMat(sandT, 1);
  var ground = new THREE.Mesh(new THREE.PlaneGeometry(48, 280), groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.z = -110;
  ground.receiveShadow = true;
  scene.add(ground);

  var mesaM = stdMat(null, 1, 0xB07F4E), mesaTop = stdMat(null, 1, 0xC29260);
  var mesas = [];
  for (var m = 0; m < 8; m++){
    var mh = 8 + (m % 3) * 5, mr = 5 + (m % 3) * 3;
    var mg = new THREE.Group();
    var mesa = new THREE.Mesh(new THREE.CylinderGeometry(mr*0.7, mr, mh, 9), mesaM);
    mesa.position.y = mh/2; mg.add(mesa);
    var cap = new THREE.Mesh(new THREE.CylinderGeometry(mr*0.68, mr*0.71, 0.7, 9), mesaTop);
    cap.position.y = mh + 0.3; mg.add(cap);
    mg.position.set((m % 2 ? 1 : -1) * rnd(26, 42), 0, -210 + m * 28);
    scene.add(mg); mesas.push(mg);
  }
  var cactM = new THREE.MeshStandardMaterial({ color: 0x4F7A2A, roughness: 0.85 });
  var rockDecoM = new THREE.MeshStandardMaterial({ color: 0x9A8468, roughness: 1 });
  var decorPool = [];

     Gezupfte Saite nach Karplus-Strong: ein Rauschimpuls läuft durch einen
     Ringspeicher und wird bei jedem Umlauf leicht geglättet. Das ergibt einen
     echten Saitenklang mit Anschlag und Ausklingen statt eines Synthesizertons. */
  var zupfCache = {};
  function zupfBuffer(freq, dauer, daempfung){
    var a = ctx(), sr = a.sampleRate;
    var schluessel = Math.round(freq) + "|" + Math.round(dauer * 100) + "|" + Math.round(daempfung * 1000);
    if (zupfCache[schluessel]) return zupfCache[schluessel];
    var N = Math.max(2, Math.round(sr / freq));
    var len = Math.floor(sr * dauer);
    var buf = a.createBuffer(1, len, sr);
    var d = buf.getChannelData(0);
    var ring = new Float32Array(N);
    for (var i = 0; i < N; i++) ring[i] = Math.random() * 2 - 1;
    var idx = 0;
    for (var j = 0; j < len; j++){
      var next = (idx + 1) % N;
      var v = daempfung * 0.5 * (ring[idx] + ring[next]);
      ring[idx] = v;
      var huelle = j < 120 ? j / 120 : 1;                 // weicher Anschlag
      var aus = j > len - 900 ? (len - j) / 900 : 1;      // sauberes Ende
      d[j] = v * huelle * aus;
      idx = next;
    }
    zupfCache[schluessel] = buf;
    return buf;
  }

  /* ---------- Pferdekörper: eine durchgehende, gelofteter Fläche ----------
     Statt zusammengesetzter Kugeln wird ein Netz erzeugt: entlang einer Wirbelsäulen-
     Kurve liegen Ringe mit eigener Breite und Höhe. Daraus entsteht eine einzige,
     nahtlose Oberfläche von der Brust bis zur Kruppe. */
  function loftGeometrie(profil, segmente){
    var ringe = [], i, j;
    for (i = 0; i < profil.length; i++){
      var p = profil[i];
      var ring = [];
      for (j = 0; j < segmente; j++){
        var a = (j / segmente) * Math.PI * 2;
        var cosA = Math.cos(a), sinA = Math.sin(a);
        // untere Hälfte etwas flacher: Bauch ist weniger rund als der Rücken
        var hy = sinA >= 0 ? p.h : p.h * (p.bauch || 0.86);
        ring.push(new THREE.Vector3(cosA * p.w + (p.dx || 0), p.y + sinA * hy, p.z));
      }
      ringe.push(ring);
    }
    var pos = [], nor = [], uv = [], idx = [], v = 0, karte = [];
    for (i = 0; i < ringe.length; i++){
      karte.push([]);
      for (j = 0; j < segmente; j++){
        var pt = ringe[i][j];
        pos.push(pt.x, pt.y, pt.z);
        uv.push(j / segmente, i / (ringe.length - 1));
        karte[i].push(v++);
      }
    }
    for (i = 0; i < ringe.length - 1; i++){
      for (j = 0; j < segmente; j++){
        var j2 = (j + 1) % segmente;
        var a1 = karte[i][j], b1 = karte[i][j2], c1 = karte[i + 1][j2], d1 = karte[i + 1][j];
        idx.push(a1, b1, c1, a1, c1, d1);
      }
    }
    var geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
    geo.setAttribute("uv", new THREE.Float32BufferAttribute(uv, 2));
    geo.setIndex(idx);
    geo.computeVertexNormals();
    return geo;
  }

  function schussKnall(){

      var t0 = a.currentTime, sr = a.sampleRate;
      var len = Math.floor(sr * 0.55);
      var buf = a.createBuffer(1, len, sr);
      var d = buf.getChannelData(0);
      for (var i = 0; i < len; i++){
        var tt = i / len;
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - tt, 9) * 1.3
             + (Math.random() * 2 - 1) * Math.pow(1 - tt, 2.4) * 0.3;
      }
      var src = a.createBufferSource(); src.buffer = buf;
      var lp = a.createBiquadFilter(); lp.type = "lowpass";
      lp.frequency.setValueAtTime(5200, t0);
      lp.frequency.exponentialRampToValueAtTime(600, t0 + 0.4);
      var g = a.createGain();
      g.gain.setValueAtTime(0.45, t0);
      g.gain.exponentialRampToValueAtTime(0.0008, t0 + 0.5);
      src.connect(lp); lp.connect(g); g.connect(a.destination); src.start(t0);
      if (navigator.vibrate) navigator.vibrate(25);
    } catch (e) {}
  }

  var swipe = null;
  function evtXY(e){
    var rect = renderer.domElement.getBoundingClientRect();
    var p = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
    return { x: p.clientX - rect.left, y: p.clientY - rect.top };
  }
  function doJump(){ if (jumpT < 0 && duckT < 0){ jumpT = 0; noiseHit(0.12, 2000, 0.12); } }
  function doDuck(){ if (duckT < 0 && jumpT < 0){ duckT = 0; } }
  function laneMove(d){ lane = Math.max(0, Math.min(2, lane + d)); }
  function onDown(e){
    if (e.cancelable) e.preventDefault();
    var p = evtXY(e);
    swipe = { x: p.x, y: p.y, used: false };
    if (musicOn) startMusic();
    if (state === "intro"){ endIntro(); swipe = null; }
  }
  function onMoveCtl(e){
    if (!swipe || swipe.used || state !== "run") return;
    if (e.cancelable) e.preventDefault();
    var p = evtXY(e);
    var dx = p.x - swipe.x, dy = p.y - swipe.y;
    if (Math.abs(dy) > 26 && Math.abs(dy) > Math.abs(dx)){
      swipe.used = true;
      if (dy < 0) doJump(); else doDuck();
    } else if (Math.abs(dx) > 26){
      swipe.used = true;
      laneMove(dx > 0 ? 1 : -1);
    }
  }
  function onUp(e){
    var s = swipe; swipe = null;
    if (state === "card"){
      if (cardMode === "next") level++;
      else if (cardMode === "start" || cardMode === "restart"){ level = 0; totalScore = 0; }
      startLevel();
      return;
    }
    if (state !== "run" || !s || s.used) return;
    var p = evtXY(e);
    var rect = renderer.domElement.getBoundingClientRect();
    if (gewehrFrei && p.y < rect.height * 0.45 && geierSchuss(p.x, p.y)) return;
    laneMove(p.x < rect.width/2 ? -1 : 1);
  }
  if (window.PointerEvent){
    wrap.addEventListener("pointerdown", onDown);
    wrap.addEventListener("pointermove", onMoveCtl);

  } else {
    wrap.addEventListener("touchstart", onDown, { passive: false });
    wrap.addEventListener("touchmove", onMoveCtl, { passive: false });

    wrap.addEventListener("mousemove", onMoveCtl);

  document.addEventListener("keydown", function(e){

    if (state === "card" && (e.code === "Space" || e.code === "Enter")){ onUp({ clientX: 0, clientY: 0 }); return; }
    if (state !== "run") return;
    if (e.code === "ArrowLeft") laneMove(-1);
    else if (e.code === "ArrowRight") laneMove(1);
    else if (e.code === "ArrowUp" || e.code === "Space"){ e.preventDefault(); doJump(); }
    else if (e.code === "ArrowDown") doDuck();

  $("introBtn").addEventListener("click", function(e){ e.stopPropagation(); startIntro(); });

  var introT = 0;
  var keys = [
    { t: 0,   p: [-13, 5.5, 7],  l: [0, 1.5, -3] },
    { t: 3.0, p: [-3.6, 1.0, 3], l: [0, 1.6, -1] },
    { t: 6.0, p: [0.4, 2.1, -7], l: [0, 1.5, 3] },
    { t: 8.6, p: [0, 3.4, 6.6],  l: [0, 1.3, -7] }
  ];
  function smooth(x){ return x*x*(3-2*x); }
  function startIntro(){
    state = "intro"; introT = 0;

  function endIntro(){

  function toScreen(pos){

  var clock = new THREE.Clock(), t = 0, hudAcc = 0;
  function animate(){
    requestAnimationFrame(animate);
    var dt = Math.min(clock.getDelta(), 0.05);
    t += dt;
    var c = cfgs[level];
    var running = state === "run";
    var cine = state === "intro";
    var spd = running ? c.speed * speedMul : (cine ? 8 : 0);
    if (running && speedMul < 1) speedMul = Math.min(1, speedMul + dt*0.5);
    if (inv > 0) inv -= dt;

    if (cine){
      introT += dt;
      var seg = 0;
      for (var ik = 0; ik < keys.length - 1; ik++) if (introT >= keys[ik].t) seg = ik;
      var k0 = keys[seg], k1 = keys[Math.min(seg+1, keys.length-1)];
      var f = k1.t === k0.t ? 1 : smooth(Math.min(1, (introT - k0.t) / (k1.t - k0.t)));
      camera.position.set(
        k0.p[0] + (k1.p[0]-k0.p[0])*f,
        k0.p[1] + (k1.p[1]-k0.p[1])*f,
        k0.p[2] + (k1.p[2]-k0.p[2])*f);
      camera.lookAt(
        k0.l[0] + (k1.l[0]-k0.l[0])*f,
        k0.l[1] + (k1.l[1]-k0.l[1])*f,
        k0.l[2] + (k1.l[2]-k0.l[2])*f);
      tEl1.style.opacity = (introT > 0.7 && introT < 4.2) ? "1" : "0";
      tEl2.style.opacity = (introT > 4.6 && introT < 7.8) ? "1" : "0";
      if (introT > 9.3) endIntro();
    }

    if (running){
      traveled += spd * dt;
      totalScore += spd * dt * 0.15;
      hudAcc++;
      if (hudAcc % 6 === 0){
        $("dist").textContent = Math.floor(traveled);
        $("score").textContent = Math.floor(totalScore);
      }
      if (!finishSpawned && traveled > c.dist - 95){
        finishSpawned = true;
        var fg = makeObstacle("finish");
        fg.position.set(0, 0, -(c.dist - traveled));
        scene.add(fg);
        items.push({ g: fg, kind: "finish" });
      }
      if (traveled >= nextAt && traveled < c.dist - 60){
        spawnStuff();
        nextAt = traveled + rnd(11, 17) * (cfgs[level].dichte || 1);
      }
      gallopAcc += dt;
      var gi = Math.max(0.16, 0.5 - spd*0.02);
      if (gallopAcc > gi){ gallopAcc = 0; noiseHit(0.045, (gallopAlt++ % 2) ? 300 : 220, 0.09); }
    }

    laneX += (LANES[lane] - laneX) * Math.min(1, dt*9);
    var jy = 0;
    if (jumpT >= 0){
      jumpT += dt;
      jy = Math.sin(Math.min(1, jumpT/0.78) * Math.PI) * 1.5;
      if (jumpT >= 0.78){ jumpT = -1; jy = 0; noiseHit(0.06, 400, 0.1); }
    }
    var dk = 0;
    if (duckT >= 0){
      duckT += dt;
      dk = Math.sin(Math.min(1, duckT/0.8) * Math.PI);
      if (duckT >= 0.8){ duckT = -1; dk = 0; }
    }
    player.position.x = laneX;
    player.position.y = jy - dk*0.42 + ((running || cine) && jumpT < 0 ? Math.abs(Math.sin(t*(spd||8)*1.1))*0.07*(1-dk) : 0);
    player.rotation.z = (LANES[lane] - laneX) * 0.12;
    player.rotation.x = jumpT >= 0 ? 0.22 - Math.min(1, jumpT/0.78)*0.44 : 0;
    pNeck.rotation.x = -0.75 - dk*0.85 + (jumpT >= 0 ? -0.2 : 0);
    pHead.rotation.x = 1.05 + dk*0.35;
    rider.position.y = 1.78 - dk*0.62;
    rider.position.z = -0.05 + dk*0.32;
    rider.rotation.x = dk*1.05;
    armHat.rotation.z = -0.5 + (jumpT >= 0 ? -1.6 : 0);
    var phase = t * ((running || cine) ? (spd || 8) * 1.15 : 3);
    for (var lg = 0; lg < 4; lg++){
      var L = pLegs[lg];
      var sw = jumpT >= 0 ? (lg < 2 ? -0.85 : 0.95) : Math.sin(phase + (lg === 0 || lg === 3 ? 0 : Math.PI)) * 0.72 * (1 - dk*0.55);
      L.g.rotation.x = sw + (dk > 0 ? (lg < 2 ? -0.35 : 0.4)*dk : 0);
      L.lower.rotation.x = (jumpT >= 0 ? (lg < 2 ? 0.9 : 0.3) : Math.max(0, -sw)*1.1) + dk*1.0;
    }
    pTail.rotation.x = 0.35 + Math.sin(t*3)*0.12;
    pTail.rotation.z = Math.sin(t*2.2)*0.18;

    groundMat.map.offset.y += spd * dt * (6/280);
    if (running && gewehrFrei){
      geierAcc += dt;
      if (geierAcc > (4.2 - level * 0.35) && geier.length < 4){
        geierAcc = 0; geierSpawnen();
      }
    }
    if (gewehrLaden > 0) gewehrLaden -= dt;
    if (running && banditenFrei){
      banditAcc += dt;
      if (banditAcc > (level >= 4 ? 4.2 : 6.0) && banditen.length < 3){
        banditAcc = 0; banditSpawnen();
        setBanner("Banditen voraus – abschiessen!", true);
      }
    }
    for (var bd2 = banditen.length - 1; bd2 >= 0; bd2--){
      var B = banditen[bd2];
      if (B.tot > 0){
        B.tot += dt;
        B.g.rotation.x = -Math.min(1.5, B.tot * 5);   // kippt nach hinten
        B.g.position.y = -B.tot * 0.4;
        B.g.position.z += spd * dt;
        if (B.tot > 1.2 || B.g.position.z > 9){ scene.remove(B.g); banditen.splice(bd2, 1); }
        continue;
      }
      B.g.position.z += spd * dt;
      // zielt auf den Reiter
      B.g.rotation.y = Math.PI + Math.atan2(laneX - B.g.position.x, Math.abs(B.g.position.z) + 1) * 0.7;
      if (!B.hatGeschossen && B.g.position.z > -7){
        B.hatGeschossen = true;
        B.g.userData.feuer.visible = true;
        schussKnall();
        setTimeout(function(bb){ return function(){ if (bb.g) bb.g.userData.feuer.visible = false; }; }(B), 90);
        crash();
      }
      if (B.g.position.z > 8){ scene.remove(B.g); banditen.splice(bd2, 1); }
    }
    for (var gv2 = geier.length - 1; gv2 >= 0; gv2--){
      var G = geier[gv2];
      if (G.tot > 0){
        G.tot += dt;
        G.g.position.y -= dt * (4 + G.tot * 7);
        G.g.rotation.z += dt * 7;
        G.g.rotation.x += dt * 3;
        if (G.g.position.y < -1){ scene.remove(G.g); geier.splice(gv2, 1); }
        continue;
      }
      G.g.position.x += G.vx * dt;
      G.g.position.z += spd * dt * 0.55;
      G.g.position.y += Math.sin(t * 0.8 + G.phase) * dt * 0.5;
      G.g.rotation.y = G.vx > 0 ? -Math.PI / 2 : Math.PI / 2;
      var schlag = Math.sin(t * 3.4 + G.phase) * 0.5;
      G.g.userData.fl.L.rotation.z = schlag;
      G.g.userData.fl.R.rotation.z = -schlag;
      if (Math.abs(G.g.position.x) > 18 || G.g.position.z > 14){
        scene.remove(G.g); geier.splice(gv2, 1);
      }
    }
    for (var sd2 = staedte.length - 1; sd2 >= 0; sd2--){
      staedte[sd2].position.z += spd * dt;
      if (staedte[sd2].position.z > 60){
        scene.remove(staedte[sd2]);
        staedte.splice(sd2, 1);
      }
    }
    if (running && traveled > naechsteStadtBei && traveled < c.dist - 130){
      stadtBauen(-115);
      naechsteStadtBei = traveled + rnd(180, 260);
    }
    for (var wk = 0; wk < winkerinnen.length; wk++){
      var wI = winkerinnen[wk];
      var schwung = Math.sin(t * 5.2 + wI.phase);
      wI.arm.rotation.z = -0.55 - schwung * 0.55;
      wI.arm.rotation.x = Math.sin(t * 2.6 + wI.phase) * 0.12;
      wI.tuch.rotation.z = schwung * 0.6;
    }
    for (var ms = 0; ms < mesas.length; ms++){
      mesas[ms].position.z += spd*dt*0.3;
      if (mesas[ms].position.z > 40) mesas[ms].position.z -= 250;
    }
    for (var dc = 0; dc < decorPool.length; dc++){
      decorPool[dc].position.z += spd*dt;
      if (decorPool[dc].position.z > 12){
        decorPool[dc].position.z = -rnd(170, 200);
        decorPool[dc].position.x = (Math.random() < 0.5 ? 1 : -1) * rnd(5.5, 17);
      }
    }

    for (var ii = items.length - 1; ii >= 0; ii--){
      var it = items[ii];
      it.g.position.z += spd * dt;
      if (it.ud && it.ud.moving){
        it.g.position.x += it.ud.vx * dt;
        if (Math.abs(it.g.position.x) > 8) it.ud.vx *= -1;
      }
      if (it.kind === "shoe" || it.kind === "gold"){
        it.g.rotation.y += dt*3;
        if (running && it.g.position.z > -0.9 && it.g.position.z < 0.9 && it.lane === lane){
          if (!it.high || jy > 0.7){
            var pts = it.kind === "gold" ? 50 : 10;
            totalScore += pts;
            if (it.kind === "shoe") shoes++;
            ding();
            var sp = toScreen(it.g.position.clone());
            popText(sp.x, sp.y, "+" + pts, "#FFE08A");
            updateHud();
            scene.remove(it.g); items.splice(ii, 1);
            continue;
          }
        }
      } else if (it.kind === "obs" && running){
        var win = it.ud.wide || 1.0;
        if (it.g.position.z > -win && it.g.position.z < win){
          var rel = it.ud.moving ? Math.abs(it.g.position.x - laneX) < 1.0 : it.ud.lanes.indexOf(lane) >= 0;
          if (rel){
            var safe = it.ud.need === "jump" ? jy > 0.5 : (it.ud.need === "duck" ? dk > 0.45 : false);
            if (!safe && inv <= 0){
              crash();
              it.ud.lanes = []; it.ud.moving = false;
            }
          }
        }
      } else if (it.kind === "finish" && running && it.g.position.z > 0.5){
        state = "done";
        levelComplete();
      }
      if (it.g.position.z > 10){ scene.remove(it.g); items.splice(ii, 1); }
    }

    tumble.position.x += dt * (1.5 + spd*0.1);
    tumble.rotation.z -= dt*3;
    tumble.position.z += spd*dt*0.5;
    if (tumble.position.x > 17){ tumble.position.x = -17; tumble.position.z = -rnd(20, 60); }
    var pos = dust.geometry.attributes.position;
    for (var dp = 0; dp < 80; dp++){
      pos.array[dp*3+2] += spd*dt*0.7;
      pos.array[dp*3+1] += Math.sin(t+dp)*dt*0.05;
      if (pos.array[dp*3+2] > 6) pos.array[dp*3+2] = -75;
    }
    pos.needsUpdate = true;

    if (!cine){
      camera.position.x += (laneX*0.55 - camera.position.x) * Math.min(1, dt*5);
      camera.position.y = 3.4 + Math.sin(t*(spd || 2)*0.55)*0.05 + jy*0.25;
      camera.position.z = 6.6;
      camera.lookAt(laneX*0.8, 1.3 + jy*0.5, -7);
    }
    renderer.render(scene, camera);
  }
  updateHud();
  renderScores();
  applyTime();
  startIntro();
  animate();
})();
<\/script>

  function canvasTex(w, h, draw, rx, ry){

  function grad(stops){

  var skyMesh = new THREE.Mesh(new THREE.SphereGeometry(180, 24, 16), new THREE.MeshBasicMaterial({ map: skyDay, side: THREE.BackSide, fog: false }));

  function spawnKette(elapsed){
    ketteAktiv = true;
    var fromLeft = Math.random() < 0.5;
    var lane = lanes[Math.floor(rnd(1, lanes.length))];
    var speed = rnd(3.4, 4.0) + Math.min(elapsed * 0.02, 1.2);
    var groessen = [0.94, 1.0, 1.06, 1.12];
    setBanner("Die Dalton-Bande reitet ein – Bob, Grat, Emmett und Bill! Alle vier = Extrapunkte!", true);
    for (var i = 0; i < 4; i++){
      var g = makeRunner("kette");
      g.scale.setScalar(groessen[i]);
      var versatz = i * 1.15;
      g.position.set((fromLeft ? -13 : 13) + (fromLeft ? -versatz : versatz), 0, lane);
      g.rotation.y = fromLeft ? Math.PI / 2 : -Math.PI / 2;
      scene.add(g);
      runners.push({ g: g, dir: fromLeft ? 1 : -1, speed: speed, isBandit: true,
        kette: true, ketteNr: i, dying: 0, phase: i * 1.4, removeAt: 0 });
    }
    setTimeout(function(){ ketteAktiv = false; }, 9000);
  }

  function spawnRunner(elapsed){
    if (!ketteAktiv && elapsed > ketteNaechste){

    var lane = lanes[Math.floor(rnd(0, lanes.length))];

    g.position.set(fromLeft ? -13 : 13, 0, lane);

  function gewehrKnall(){

      var len = Math.floor(a.sampleRate * 0.75);
      var buf = a.createBuffer(1, len, a.sampleRate);

        var koerper = (Math.random() * 2 - 1) * Math.pow(1 - t, 2.2) * 0.45;  // Nachdruck
        var echo = (i > a.sampleRate * 0.18)
          ? (Math.random() * 2 - 1) * Math.pow(1 - t, 3) * 0.22 : 0;          // Canyon
        d[i] = knall + koerper + echo;
      }
      var src = a.createBufferSource(); src.buffer = buf;
      var tief = a.createBiquadFilter(); tief.type = "lowpass";
      tief.frequency.setValueAtTime(4200, a.currentTime);
      tief.frequency.exponentialRampToValueAtTime(520, a.currentTime + 0.5);
      var g = a.createGain();
      g.gain.setValueAtTime(0.55, a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0008, a.currentTime + 0.72);

    } catch (err) {}
  }

    }
    if (mode === "duel" && dFall === 0 && camFall === 0 && !introActive){
      duelOpp.position.x = Math.sin(t * 0.8) * 0.06;
      duelOpp.rotation.y = Math.sin(t * 0.5) * 0.05;
    }

    rotor.rotation.z += dt * 1.6;
    flame.scale.y = 1 + Math.sin(t * 11) * 0.18;
    flame2.scale.y = 1 + Math.sin(t * 15 + 1) * 0.25;
    fireLight.intensity = 0.75 + Math.sin(t * 12) * 0.12 + Math.sin(t * 31) * 0.08;
    var sPos = smoke.geometry.attributes.position;
    for (var sm = 0; sm < 16; sm++){
      sPos.array[sm * 3 + 1] += dt * 0.9;
      sPos.array[sm * 3] += Math.sin(t + sm) * dt * 0.15;
      if (sPos.array[sm * 3 + 1] > 6.5){
        sPos.array[sm * 3 + 1] = 0.8;
        sPos.array[sm * 3] = -8.5 + rnd(-0.3, 0.3);
      }
    }
    sPos.needsUpdate = true;

    for (var ai = arrows.length - 1; ai >= 0; ai--){
      var ar = arrows[ai];
      ar.life -= dt;
      ar.vel.y -= 4.5 * dt;
      ar.g.position.addScaledVector(ar.vel, dt);
      ar.g.lookAt(ar.g.position.clone().add(ar.vel));
      var removed = false;
      if (ar.g.position.y > 0.05 && ar.g.position.y < 2.6){
        for (var rr = 0; rr < runners.length; rr++){
          var ru = runners[rr];
          if (ru.dying > 0) continue;
          if (Math.abs(ar.g.position.x - ru.g.position.x) < 0.55 && Math.abs(ar.g.position.z - ru.g.position.z) < 0.55){
            thunkSound();
            if (navigator.vibrate) navigator.vibrate(25);
            var sc = toScreen(ru.g.position.clone().setY(1.6));
            registerHit(ru, sc.x, sc.y);
            scene.remove(ar.g);
            arrows.splice(ai, 1);
            removed = true;
            break;
          }
        }
        if (!removed){
          for (var hz2 = 0; hz2 < horses.length; hz2++){
            var hg = horses[hz2].g;
            if (Math.abs(ar.g.position.x - hg.position.x) < 0.85 && Math.abs(ar.g.position.z - hg.position.z) < 0.95){
              thunkSound();
              scene.remove(ar.g);
              arrows.splice(ai, 1);
              removed = true;
              startGallows("Du hast ein Pferd getroffen!");
              break;
            }
          }
        }
      }
      if (removed) continue;
      if (ar.g.position.y <= 0.02){
        ar.g.position.y = 0.02;
        ar.life = Math.min(ar.life, 0.8);
        ar.vel.set(0, 0, 0);
      }
      if (ar.life <= 0 || Math.abs(ar.g.position.x) > 40 || ar.g.position.z < -60){
        scene.remove(ar.g);
        arrows.splice(ai, 1);
      }
    }

    for (var r = runners.length - 1; r >= 0; r--){
      var run = runners[r];
      if (run.dying > 0){
        run.dying = Math.min(1.4, run.dying + dt * 2.2);
        var f = Math.min(1, run.dying);
        run.g.rotation.x = -f * f * Math.PI / 2;
        run.g.position.y = -f * f * 0.1;
        if (run.dying >= 1.4){
          scene.remove(run.g);
          runners.splice(r, 1);
        }
        continue;
      }
      run.g.position.x += run.dir * run.speed * dt;
      var sw = Math.sin(t * run.speed * 2.6 + run.phase) * 0.6;
      var p = run.g.userData.parts;
      if (p.legL){ p.legL.rotation.x = sw; p.legR.rotation.x = -sw; }
      if (p.armL){ p.armL.rotation.x = -sw * 0.8; p.armR.rotation.x = sw * 0.8; }
      run.g.position.y = Math.abs(Math.sin(t * run.speed * 2.6 + run.phase)) * 0.06;
      if ((run.dir > 0 && run.g.position.x > 13.5) || (run.dir < 0 && run.g.position.x < -13.5)){
        var wasBandit = run.isBandit;
        scene.remove(run.g);
        runners.splice(r, 1);
        if (wasBandit && state === "playing") loseLife("Ein Bandit ist entkommen!");
        continue;
      }
    }

    if (recoil > 0) recoil = Math.max(0, recoil - dt * 6);
    var kick = weapon === "win" ? 0.65 : (weapon === "bow" ? 0.15 : 0.5);
    var actGroups = weaponGroups[weapon];
    for (var wg = 0; wg < actGroups.length; wg++){
      var gobj = actGroups[wg];
      var bb = gobj === coltL ? { x: -0.33, y: -0.33, rx: 0.12 }
             : gobj === winch ? { x: 0.2, y: -0.3, rx: 0.1 }
             : gobj === bow ? { x: -0.16, y: -0.18, rx: 0 }
             : { x: 0.33, y: -0.33, rx: 0.12 };
      gobj.rotation.x = bb.rx - aim.y * 0.32 + recoil * kick;
      gobj.rotation.y = -aim.x * 0.38;
      gobj.position.x = bb.x + aim.x * 0.15;
      gobj.position.y = bb.y + aim.y * 0.12;
    }
    for (var cr = 0; cr < crows.length; cr++){
      var b = crows[cr];
      if (b.fly > 0){
        b.fly += dt;
        b.g.position.y += dt * (3.2 + Math.sin(b.phase) * 0.5);
        b.g.position.x -= dt * 3.5;
        b.g.position.z += dt * 1.5;
        var flap = Math.sin(t * 22 + b.phase) * 0.9;
        b.wL.rotation.z = flap; b.wR.rotation.z = -flap;
        if (b.fly > 5){
          b.fly = 0;
          b.g.position.copy(b.home);
          b.wL.rotation.z = 0; b.wR.rotation.z = 0;
        }
      } else {
        b.g.position.y = b.home.y + Math.abs(Math.sin(t * 1.1 + b.phase)) * 0.015;
        if (Math.sin(t * 0.9 + b.phase * 3) > 0.985){
          b.wL.rotation.z = 0.5; b.wR.rotation.z = -0.5;
        } else { b.wL.rotation.z = 0; b.wR.rotation.z = 0; }
      }
    }
    for (var hzi = 0; hzi < horses.length; hzi++){
      var hz = horses[hzi];
      hz.neck.rotation.x = hz.baseNeck + Math.sin(t * (hz.drinking ? 0.9 : 0.7) + hz.phase) * 0.08;
      hz.tail.rotation.x = 0.5 + Math.sin(t * 2.1 + hz.phase) * 0.18;
      hz.tail.rotation.z = Math.sin(t * 1.6 + hz.phase) * 0.22;
    }
    rope.rotation.z = Math.sin(t * 0.9) * 0.06;
    rope.rotation.x = Math.sin(t * 0.7 + 1) * 0.04;
    tumble.position.x += dt * 1.7;
    tumble.rotation.z -= dt * 3.2;
    if (tumble.position.x > 17) tumble.position.x = -17;
    var pos = dust.geometry.attributes.position;
    for (var dp = 0; dp < 120; dp++){
      pos.array[dp * 3] += dt * 0.35;
      pos.array[dp * 3 + 1] += Math.sin(t + dp) * dt * 0.06;
      if (pos.array[dp * 3] > 13) pos.array[dp * 3] = -13;
    }
    pos.needsUpdate = true;
    if (!introActive && state !== "gallows" && state !== "gallowsDone" && camFall === 0){
      camera.position.x = camBase.x + Math.sin(t * 0.6) * 0.02;
      camera.position.y = camBase.y + Math.sin(t * 1.3) * 0.012;
    }
    renderer.render(scene, camera);
  }
  updateAmmo();
  updateLives();
  renderScores();
  applyTime();
  startIntro();
  animate();
})();
<\/script>

/* ---------- Bestenliste ----------
   Adresse des eigenen Cloudflare-Workers hier eintragen, z. B.
   "https://bestenliste.deinname.workers.dev". Leer = nur lokale Bestzeiten. */
const TAFEL_URL = "https://bestenliste.ismaelheusser.workers.dev";

function spielerName(){
  try{ return localStorage.getItem("dg.name") || ""; }catch(e){ return ""; }
}
function spielerNameSetzen(n){ try{ localStorage.setItem("dg.name", n); }catch(e){} }

async function tafelLesen(spiel){
  if (!TAFEL_URL) return null;
  const a = await fetch(`${TAFEL_URL}?spiel=${spiel}`);
  if (!a.ok) throw new Error("Liste nicht erreichbar");
  return a.json();
}
async function tafelSenden(spiel, name, punkte){
  if (!TAFEL_URL) return null;
  const a = await fetch(`${TAFEL_URL}?spiel=${spiel}`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({name, punkte})
  });
  if (!a.ok) throw new Error("Senden fehlgeschlagen");
  return a.json();
}
async function eintragen(spiel, punkte){
  if (!TAFEL_URL) return;
  let name = spielerName();
  if (!name){
    name = (prompt("Name für die Bestenliste (max. 16 Zeichen)") || "").trim();
    if (!name) return;
    spielerNameSetzen(name.slice(0,16));
  }
  try{ await tafelSenden(spiel, spielerName(), punkte); }catch(e){}
}

/* ---------- Vollbild-Gerüst ---------- */
let blobUrl = {};
function vollbild(titel, innen){
  const o = document.createElement("div");
  o.id = "vollbild";
  o.innerHTML = `<div class="leiste"><span>${titel}</span><button id="vbZu">Zurück</button></div>${innen}`;
  document.body.appendChild(o);
  document.body.style.overflow = "hidden";
  o.querySelector("#vbZu").onclick = vollbildZu;
  return o;
}
function jagdErgebnisUebernehmen(){
  try{
    const liste = JSON.parse(localStorage.getItem("bj_scores") || "[]");
    if (!liste.length) return;
    const best = liste.reduce((a,b)=> (b.score||0) > (a.score||0) ? b : a);
    if (best && best.score > 0) eintragen("jagd", best.score);
  }catch(e){}
}
function vollbildZu(){
  const o = document.getElementById("vollbild");
  if (o && o.querySelector("#rahmen")) jagdErgebnisUebernehmen();
  if (o) o.remove();
  document.body.style.overflow = "";
  if (duellTakt){ clearTimeout(duellTakt); duellTakt = null; }
}

function spielCode(id){
  const el = document.getElementById("code_" + id);
  return el ? el.textContent.replace(/<\\\/script>/g, "<\/script>") : null;
}

function spielRahmen(id){
  const code = spielCode(id);
  if (!code) return;
  const titel = id === "ritt" ? "Präriereiter" : "Banditen-Jagd";
  const o = vollbild(titel, `<iframe id="rahmen" allow="autoplay; fullscreen" allowfullscreen scrolling="no"></iframe>`);
  const rahmen = o.querySelector("#rahmen");
  let geladen = false;
  rahmen.addEventListener("load", ()=> geladen = true);
  try { rahmen.srcdoc = code; } catch(e){}
  setTimeout(()=>{
    if (geladen || !document.body.contains(rahmen)) return;
    try{
      blobUrl[id] = blobUrl[id] || URL.createObjectURL(new Blob([code], {type:"text/html"}));
      rahmen.removeAttribute("srcdoc"); rahmen.src = blobUrl[id];
    }catch(e){}
  }, 2500);
}

window.addEventListener("message", (ev)=>{
  const d = ev.data;
  if (!d || d.typ !== "dg-ergebnis") return;
  const spiel = d.spiel || "jagd";
  if (typeof d.punkte === "number" && d.punkte > 0) eintragen(spiel, d.punkte);
  const l = document.querySelector("#vollbild .leiste span");
  if (l) l.textContent = spiel === "ritt"
    ? `${d.punkte} Punkte · Level ${d.level} · ${d.meter} m`
    : `${d.punkte} Punkte · ${d.kills} Banditen · ${d.sekunden}s`;
});

/* ---------- Bestenliste anzeigen ---------- */
async function tafelZeigen(){
  const o = vollbild("Bestenliste", `<div id="tafel"></div>`);
  const ziel = o.querySelector("#tafel");
  if (!TAFEL_URL){
    ziel.innerHTML = `<div class="tafelinhalt"><h2>Noch nicht verbunden</h2>
      <p>Die Bestenliste braucht einen kleinen Dienst, der die Punkte entgegennimmt.
      Die Anleitung steht in der Datei <b>worker.js</b>. Danach die Adresse oben im Code
      bei <b>TAFEL_URL</b> eintragen – fertig.</p>
      <p>Bis dahin werden Bestzeiten nur auf diesem Gerät gespeichert.</p></div>`;
    return;
  }
  ziel.innerHTML = `<div class="tafelinhalt"><p>Lädt …</p></div>`;
  try{
    const [jagd, ritt, duell] = await Promise.all([
      tafelLesen("jagd"), tafelLesen("ritt"), tafelLesen("duell")]);
    ziel.innerHTML = `<div class="tafelinhalt">
      <h2>Banditen-Jagd</h2>${tafelListe(jagd, "Punkte")}
      <h2>Präriereiter</h2>${tafelListe(ritt, "Punkte")}
      <h2>Schnelles Duell</h2>${tafelListe(duell, "ms")}
      <button id="namebtn">Name ändern${spielerName() ? " · " + spielerName() : ""}</button>
    </div>`;
    ziel.querySelector("#namebtn").onclick = ()=>{
      const n = (prompt("Dein Name", spielerName()) || "").trim();
      if (n){ spielerNameSetzen(n.slice(0,16)); tafelZeigen(); }
    };
  }catch(e){
    ziel.innerHTML = `<div class="tafelinhalt"><h2>Keine Verbindung</h2>
      <p>Die Liste ist gerade nicht erreichbar. Deine Punkte gehen nicht verloren –
      versuch es später noch einmal.</p></div>`;
  }
}
function tafelListe(liste, einheit){
  if (!liste || !liste.length) return `<p class="leer">Noch keine Einträge – sei der Erste.</p>`;
  return `<ol class="rang">${liste.map(e=>
    `<li><span>${e.name}</span><b>${e.punkte} ${einheit}</b></li>`).join("")}</ol>`;
}

          <path d="M196 118 v-24 h12 v24z"/><circle cx="202" cy="88" r="7"/>
          <path id="hutB" d="M190 82 h24 v-3 h-24z M195 79 h14 v-7 h-14z"/>
        </g>
      </svg>
      <div id="ruf">bereithalten …</div>
      <div id="stand"></div>
    </div>
    <div id="ende">
      <h2 id="endeTitel"></h2>
      <p id="endeText"></p>
      <button id="nochmal">Noch einmal</button>
    </div>`);
  duellRunde();
}

function duellRunde(){
  const flaeche = document.getElementById("duellflaeche");
  if (!flaeche) return;
  if (D.runde >= 5) return duellEnde();
  D.runde++;
  const ruf = document.getElementById("ruf");
  const stand = document.getElementById("stand");
  const hutA = document.getElementById("hutA"), hutB = document.getElementById("hutB");
  hutA.style.transform = ""; hutB.style.transform = "";
  flaeche.className = "";
  ruf.textContent = "bereithalten …";
  stand.textContent = `Runde ${D.runde} von 5 · ${D.siege} gewonnen` +
    (D.beste ? ` · beste ${D.beste} ms` : "");

  const gegner = 260 + Math.random()*180;
  D.bereit = false;

  duellTakt = setTimeout(()=>{
    if (!document.body.contains(flaeche)) return;
    D.bereit = true; D.start = performance.now();
    flaeche.classList.add("zieh"); ruf.textContent = "ZIEH!";
    duellTakt = setTimeout(()=>{ if (document.body.contains(flaeche)) aufloesen(null); }, 1400);
  }, 1400 + Math.random()*2600);

  flaeche.onclick = ()=>{
    if (!D.bereit){
      clearTimeout(duellTakt);
      flaeche.classList.add("frueh"); ruf.textContent = "Zu früh gezogen.";
      duellTakt = setTimeout(duellRunde, 1300);
      return;
    }
    clearTimeout(duellTakt);
    aufloesen(Math.round(performance.now() - D.start));
  };

  function aufloesen(meine){
    D.bereit = false; flaeche.onclick = null;
    if (meine !== null && (D.beste === null || meine < D.beste)){ D.beste = meine; besteSchreiben(meine); }
    if (meine !== null && meine < gegner){
      D.siege++; hutB.style.transform = "translate(14px,-34px) rotate(38deg)";
      ruf.textContent = `${meine} ms · gewonnen`;
    } else {
      hutA.style.transform = "translate(-14px,-34px) rotate(-38deg)";
      ruf.textContent = meine === null ? "Zu langsam." : `${meine} ms · er war schneller`;
    }
    duellTakt = setTimeout(duellRunde, 1600);
  }
}

function duellEnde(){
  const kasten = document.getElementById("ende");
  if (!kasten) return;
  document.getElementById("endeTitel").textContent = `${D.siege} von 5`;
  document.getElementById("endeText").textContent =
    (D.beste ? `Deine schnellste Hand: ${D.beste} ms. ` : "") +
    (D.siege >= 4 ? "Der Sheriff sucht Verstärkung." :
     D.siege >= 2 ? "Solide Hand." : "Übung schadet nie.");
  kasten.style.display = "flex";
  if (D.beste) eintragen("duell", D.beste);
  document.getElementById("nochmal").onclick = ()=>{
    kasten.style.display = "none";
    D.runde = 0; D.siege = 0; duellRunde();
  };
}
</script>
</body>
</html>
