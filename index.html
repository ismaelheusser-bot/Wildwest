<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#14100D">
<title>Dusty Gulch – Arcade</title>
<style>
:root{
  --nacht:#14100D;
  --nacht-2:#1F1811;
  --sand:#E8C88E;
  --sand-2:#B9A180;
  --rost:#B5533F;
  --gold:#E8A33D;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0}
#grund{position:fixed;inset:0;z-index:-1;background:var(--nacht)}
body{
  font-family:var(--sans);color:var(--sand);background:var(--nacht);
  font-size:17px;line-height:1.5;overscroll-behavior:none;
}
#menue{
  position:relative;z-index:1;min-height:100dvh;max-width:560px;margin:0 auto;
  padding:max(24px,env(safe-area-inset-top)) 20px max(24px,env(safe-area-inset-bottom));
  display:flex;flex-direction:column;
}

.kopf{text-align:center;padding:20px 0 6px}
.kopf .stern{color:var(--rost);letter-spacing:.6em;font-size:12px}
h1{
  font-family:var(--serif);font-weight:400;font-size:44px;line-height:1;
  margin:12px 0 6px;letter-spacing:.02em;color:var(--gold);
}
.kopf p{margin:0;color:var(--sand-2);font-size:14px;letter-spacing:.18em;text-transform:uppercase}

.horizont{margin:26px -20px 8px}
.horizont svg{display:block;width:100%}

.regal{display:flex;flex-direction:column;gap:12px;margin-top:8px}
.karte{
  display:flex;gap:16px;align-items:center;text-align:left;width:100%;
  font:inherit;color:var(--sand);cursor:pointer;
  background:linear-gradient(180deg,rgba(232,200,142,.09),rgba(232,200,142,.04));
  border:1px solid rgba(232,200,142,.22);border-radius:18px;padding:16px;
  transition:transform 120ms ease,border-color 160ms ease;
}
.karte:active{transform:scale(.99)}
.karte:hover{border-color:rgba(232,163,61,.6)}
.karte .bild{width:62px;height:62px;flex:none;border-radius:14px;overflow:hidden;background:#0F0B08}
.karte .bild svg{display:block;width:100%;height:100%}
.karte b{display:block;font-family:var(--serif);font-size:20px;font-weight:400;letter-spacing:.01em}
.karte small{display:block;color:var(--sand-2);font-size:14px;margin-top:3px;line-height:1.35}
.karte .marke{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-top:6px}

footer{margin-top:auto;padding-top:26px;color:var(--sand-2);font-size:13px;text-align:center}
footer a{color:var(--sand-2)}

/* Vollbild für die Spiele */
#vollbild{position:fixed;inset:0;z-index:200;background:#0A0806;display:flex;flex-direction:column}
#vollbild iframe{flex:1;width:100%;border:0;display:block}
#vollbild .leiste{
  position:absolute;top:max(8px,env(safe-area-inset-top));left:0;right:0;z-index:5;
  display:flex;justify-content:space-between;align-items:center;padding:0 12px;pointer-events:none;
}
#vollbild .leiste span{
  font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);
  background:rgba(0,0,0,.55);padding:6px 12px;border-radius:999px;
}
#vollbild .nurX{
  position:absolute;top:max(6px,env(safe-area-inset-top));right:10px;z-index:9;
  width:34px;height:34px;border-radius:50%;border:0;cursor:pointer;
  background:rgba(0,0,0,.5);color:#E8C88E;font-size:22px;line-height:1;
}
#vollbild .leiste button{
  pointer-events:auto;font:inherit;font-size:14px;font-weight:600;color:#F5F1E8;
  background:rgba(0,0,0,.6);border:0;border-radius:999px;padding:8px 16px;cursor:pointer;
}

.infobtn{
  position:absolute;right:12px;bottom:10px;
  font:inherit;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--sand-2);background:transparent;border:1px solid rgba(232,200,142,.28);
  border-radius:999px;padding:5px 11px;cursor:pointer;
}
.karte{position:relative}
ul.regeln{margin:8px 0 0;padding-left:20px;color:var(--sand-2);font-size:15px;line-height:1.55}
ul.regeln li{margin:5px 0}
#losbtn{
  margin-top:28px;width:100%;font:inherit;font-size:16px;font-weight:600;
  background:var(--gold);color:#1A1209;border:0;border-radius:14px;padding:15px;cursor:pointer;
}
.gruppe{font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold);font-weight:600;margin-top:24px}
#tafel{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tafelinhalt{
  max-width:520px;margin:0 auto;
  padding:calc(max(8px,env(safe-area-inset-top)) + 56px) 20px max(24px,env(safe-area-inset-bottom));
}
.tafelinhalt h2{font-family:var(--serif);font-weight:400;font-size:24px;color:var(--gold);margin:26px 0 10px}
.tafelinhalt h2:first-child{margin-top:0}
.tafelinhalt p{color:var(--sand-2);font-size:15px}
.tafelinhalt p.leer{font-style:italic}
.tafelinhalt b{color:var(--sand)}
ol.rang{list-style:none;counter-reset:r;margin:0;padding:0}
ol.rang li{
  counter-increment:r;display:flex;justify-content:space-between;gap:14px;align-items:baseline;
  padding:11px 0;border-bottom:1px solid rgba(232,200,142,.16);
}
ol.rang li::before{content:counter(r) ".";color:var(--sand-2);font-size:13px;width:26px;flex:none}
ol.rang li span{flex:1}
ol.rang li:nth-child(1) b{color:var(--gold)}
#namebtn{
  margin-top:30px;width:100%;font:inherit;font-size:15px;color:var(--sand-2);
  background:transparent;border:1px dashed rgba(232,200,142,.3);border-radius:14px;
  padding:14px;cursor:pointer;
}
/* Duell */
#duellflaeche{
  position:absolute;inset:0;overflow:hidden;
  background:#12100E;cursor:pointer;user-select:none;
}
#duellflaeche svg{position:absolute;inset:0;width:100%;height:100%;display:block}
/* Anspannung: das Bild zieht waehrend des Wartens langsam heran */
#szeneZoom{transform-origin:150px 190px;transition:transform 2.6s ease-in}
#duellflaeche.warten #szeneZoom{transform:scale(1.12)}
#duellflaeche.zieh #szeneZoom{transform:scale(1.2);transition:transform 140ms ease-out}
/* Dein Revolver kommt von unten ins Bild */
#meineHand{transform:translateY(120px) rotate(14deg);transform-origin:150px 300px;
  transition:transform 170ms cubic-bezier(.2,.9,.3,1.3)}
#duellflaeche.gezogen #meineHand{transform:translateY(0) rotate(0deg)}
#muendungA,#muendungB{opacity:0}
#duellflaeche.blitzA #muendungA{opacity:1}
#duellflaeche.blitzB #muendungB{opacity:1}
#hutG{transition:transform 620ms cubic-bezier(.3,-.35,.5,1.35)}
#duellflaeche.hutAb #hutG{transform:translate(26px,-86px) rotate(52deg)}
/* Treffer beim Gegner: kurzes helles Aufblitzen, Niederlage: roter Schlag */
#schlagWeiss,#schlagRot{position:absolute;inset:0;pointer-events:none;opacity:0;
  transition:opacity 420ms ease}
#schlagWeiss{background:radial-gradient(circle at 50% 42%,rgba(255,240,200,.75),transparent 62%)}
#schlagRot{background:radial-gradient(circle at 50% 46%,rgba(190,40,26,.62),rgba(90,10,6,.5) 70%)}
#duellflaeche.gewonnen #schlagWeiss{opacity:1}
#duellflaeche.verloren #schlagRot{opacity:1}
#duellflaeche.frueh{filter:grayscale(.85) brightness(.7)}
#ruf{
  position:absolute;left:0;right:0;top:34%;text-align:center;pointer-events:none;
  font-family:var(--serif);font-size:34px;color:#F4E2BC;
  text-shadow:0 2px 10px rgba(0,0,0,.8),0 0 26px rgba(0,0,0,.6);
  transition:font-size 120ms ease,color 120ms ease;
}
#duellflaeche.zieh #ruf{font-size:70px;font-weight:700;color:#FFE9A8}
/* Fuenf Hutmarken statt einer Textzeile */
#marken{
  position:absolute;top:max(12px,env(safe-area-inset-top));left:0;right:0;
  display:flex;justify-content:center;gap:10px;pointer-events:none;
}
#marken i{
  width:20px;height:13px;display:block;opacity:.3;
  background:no-repeat center/contain
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 16'><path d='M2 12h20v-2H2z M7 10h10V3H7z' fill='%23E8C88E'/></svg>");
}
#marken i.sieg{opacity:1}
#marken i.pech{opacity:.55;filter:grayscale(1) brightness(.6)}
#stand{
  position:absolute;bottom:max(14px,env(safe-area-inset-bottom));left:0;right:0;text-align:center;
  font-size:12px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(232,200,142,.75);pointer-events:none;text-shadow:0 1px 6px rgba(0,0,0,.9);
}
#ende{
  position:absolute;inset:0;display:none;flex-direction:column;justify-content:center;
  align-items:center;gap:18px;background:rgba(20,16,13,.93);text-align:center;padding:30px;
}
#ende h2{font-family:var(--serif);font-weight:400;font-size:34px;color:var(--gold);margin:0}
#ende p{margin:0;color:var(--sand-2)}
#ende button{
  font:inherit;font-size:16px;font-weight:600;background:var(--gold);color:#1A1209;
  border:0;border-radius:14px;padding:15px 26px;cursor:pointer;
}
/* Eigene Namensabfrage statt prompt() – dazu unten mehr. */
#namensKasten{
  position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;
  background:rgba(12,9,7,.88);padding:24px;
}
#namensKasten .innen{
  background:#1E1712;border:1px solid rgba(232,200,142,.25);border-radius:18px;
  padding:26px 22px;max-width:340px;width:100%;text-align:center;
}
#namensKasten h3{font-family:var(--serif);font-weight:400;font-size:24px;color:var(--gold);margin:0 0 8px}
#namensKasten p{margin:0 0 16px;color:var(--sand-2);font-size:14px;line-height:1.45}
#namensFeld{
  font:inherit;font-size:17px;width:100%;box-sizing:border-box;text-align:center;
  background:#100C09;color:var(--sand);border:1px solid rgba(232,200,142,.3);
  border-radius:12px;padding:13px;margin-bottom:14px;
}
#namensKasten .knoepfe{display:flex;gap:10px}
#namensKasten button{
  font:inherit;font-size:15px;font-weight:600;flex:1;border:0;border-radius:12px;
  padding:13px;cursor:pointer;
}
#namensOk{background:var(--gold);color:#1A1209}
#namensNein{background:transparent;color:var(--sand-2);border:1px solid rgba(232,200,142,.25)}
#tafelHinweis{
  position:fixed;left:50%;transform:translateX(-50%) translateY(14px);
  bottom:max(22px,env(safe-area-inset-bottom));z-index:310;
  background:#1E1712;border:1px solid rgba(232,200,142,.3);border-radius:999px;
  padding:12px 20px;color:var(--sand);font-size:14px;
  opacity:0;pointer-events:none;transition:opacity .3s ease,transform .3s ease;
  max-width:86vw;text-align:center;
}
#tafelHinweis.an{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){*{transition-duration:1ms!important}}
</style>
</head>
<body>
<div id="grund"></div>
<div id="menue">
  <div class="kopf">
    <div class="stern">★ ★ ★</div>
    <h1>Dusty Gulch</h1>
    <p>Arcade</p>
  </div>

  <div class="horizont">
    <svg viewBox="0 0 320 70" aria-hidden="true">
      <circle cx="255" cy="40" r="16" fill="#E8A33D" opacity=".28"/>
      <path d="M0 54 L40 34 L64 48 L96 22 L130 48 L168 30 L200 50 L240 36 L280 52 L320 40 L320 70 L0 70Z"
            fill="#1F1811"/>
      <g fill="#0F0B08">
        <path d="M18 62 h5 v-14 h-5z M12 52 q6-9 6 0z M29 49 q-6-10-6 0z"/>
        <path d="M296 64 h4 v-11 h-4z M291 56 q5-8 5 0z"/>
      </g>
    </svg>
  </div>

  <div class="regal" id="regal"></div>

  <footer>
    Läuft ohne Konto und ohne Werbung.<br>
    Bestzeiten bleiben nur auf diesem Gerät.<br>
    <span style="opacity:.6">Version 2026-07-23 · ea5bd9</span>
  </footer>
</div>

<script>
"use strict";

window.addEventListener("error", (ev)=>{
  try{
    const b = document.getElementById("regal");
    if (b) b.insertAdjacentHTML("afterbegin",
      `<div style="padding:12px 16px;border:1px solid rgba(232,200,142,.35);border-radius:12px;
        color:#E8A33D;font-size:13px;margin-bottom:8px">Startfehler: ${ev.message || "unbekannt"}</div>`);
  }catch(e){}

  const b = document.getElementById("regal");
  if (b && !b.children.length){
    b.innerHTML = `<div style="padding:16px;border:1px solid rgba(232,200,142,.3);
      border-radius:14px;color:#B9A180;font-size:14px">
      <b style="color:#E8A33D">Fehler beim Start</b><br>${ev.message || "unbekannt"}</div>`;
  }
});

/* ---------- Bestenliste ----------
   Adresse des eigenen Cloudflare-Workers hier eintragen, z. B.
   "https://bestenliste.deinname.workers.dev". Leer = nur lokale Bestzeiten. */
const TAFEL_URL = "https://bestenliste.ismaelheusser.workers.dev";

function spielerName(){
  try{ return localStorage.getItem("dg.name") || ""; }catch(e){ return ""; }
}
function spielerNameSetzen(n){ try{ localStorage.setItem("dg.name", n); }catch(e){} }

async function tafelLesen(spiel){
  if (!TAFEL_URL) return null;
  const a = await fetch(`${TAFEL_URL}?spiel=${spiel}`);
  if (!a.ok) throw new Error("Liste nicht erreichbar");
  return a.json();
}
async function tafelSenden(spiel, name, punkte){
  if (!TAFEL_URL) return null;
  const a = await fetch(`${TAFEL_URL}?spiel=${spiel}`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({name, punkte})
  });
  if (!a.ok) throw new Error("Senden fehlgeschlagen");
  return a.json();
}
/* ---------- Eintrag in die Bestenliste ----------
   Hier steckten drei Fehler, die sich gegenseitig verdeckt haben:

   1. prompt() wurde aus einem postMessage-Empfänger heraus aufgerufen. Safari
      auf dem iPhone lässt das nicht zu, weil keine Nutzergeste vorausging –
      der Aufruf lieferte still null und die Funktion brach ab. Der Saloon
      meldet sein Ergebnis genau auf diesem Weg, deshalb kam von dort NIE ein
      Eintrag an, während das Duell (nach einem Antippen) funktionierte.
   2. Der Worker kannte "saloon" gar nicht und wies jede Sendung ab.
   3. Beide Fehler landeten in einem leeren catch – es gab also nie eine
      Rückmeldung, weder Erfolg noch Misserfolg.

   Jetzt: eigene Namensabfrage im Dokument, wartende Einträge werden gemerkt,
   und jeder Ausgang wird sichtbar gemeldet. */
let wartendeEintraege = [];

function tafelMelden(text, dauer){
  const h = document.getElementById("tafelHinweis");
  if (!h) return;
  h.textContent = text;
  h.classList.add("an");
  clearTimeout(tafelMelden.t);
  tafelMelden.t = setTimeout(()=> h.classList.remove("an"), dauer || 4200);
}

const SPIELTITEL = { jagd:"Banditen-Jagd", ritt:"Präriereiter",
                     saloon:"Saloon Brawl", duell:"Schnelles Duell" };

async function absenden(spiel, punkte){
  const name = spielerName();
  const einheit = spiel === "duell" ? " ms" : " Punkte";
  try{
    const liste = await tafelSenden(spiel, name, punkte);
    const platz = Array.isArray(liste)
      ? liste.findIndex(e => e.name === name && e.punkte === punkte) + 1
      : 0;
    if (platz > 0){
      tafelMelden(`${SPIELTITEL[spiel] || spiel}: Platz ${platz} mit ${punkte}${einheit}`);
    } else {
      tafelMelden(`${punkte}${einheit} – noch nicht unter den besten 20`);
    }
  }catch(e){
    tafelMelden("Bestenliste nicht erreichbar – Ergebnis nicht eingetragen");
  }
}

function eintragen(spiel, punkte){
  if (!TAFEL_URL) return;
  if (!Number.isFinite(punkte) || punkte <= 0) return;
  if (spielerName()) return absenden(spiel, punkte);
  // Noch kein Name: Ergebnis merken und danach fragen
  wartendeEintraege.push({ spiel, punkte });
  namenErfragen(spiel, punkte);
}

function namenErfragen(spiel, punkte){
  const kasten = document.getElementById("namensKasten");
  if (!kasten) return;
  const einheit = spiel === "duell" ? " ms" : " Punkte";
  document.getElementById("namensText").textContent =
    `${SPIELTITEL[spiel] || spiel}: ${punkte}${einheit}. Unter welchem Namen soll das stehen?`;
  kasten.style.display = "flex";
  const feld = document.getElementById("namensFeld");
  feld.value = "";
  setTimeout(()=>{ try{ feld.focus(); }catch(e){} }, 60);

  const schliessen = ()=>{ kasten.style.display = "none"; };
  document.getElementById("namensNein").onclick = ()=>{
    wartendeEintraege = []; schliessen();
  };
  document.getElementById("namensOk").onclick = ()=>{
    const n = (feld.value || "").trim().slice(0,16);
    if (!n){ feld.focus(); return; }
    spielerNameSetzen(n);
    schliessen();
    const offen = wartendeEintraege; wartendeEintraege = [];
    offen.forEach(e => absenden(e.spiel, e.punkte));
  };
  feld.onkeydown = (ev)=>{
    if (ev.key === "Enter") document.getElementById("namensOk").onclick();
  };
}

const ANLEITUNG = {
  jagd: {
    titel: "Banditen-Jagd",
    ziel: "Neunzig Sekunden, fünf Leben. Triff alles mit rotem Halstuch – und niemanden sonst.",
    steuerung: [
      "Auf einen Banditen tippen = schiessen",
      "Waffe über die Knöpfe unten wechseln",
      "Leer? Kurz warten, es wird selbst nachgeladen"
    ],
    punkte: [
      "Bandit: 10 bis 25 Punkte je nach Waffe",
      "Dalton-Bande: zweieinhalbfach, alle vier = 500 extra",
      "Bürger oder Pferd getroffen: ein Leben weg"
    ],
    tipp: "Die Winchester gibt die meisten Punkte pro Treffer, die AK-47 die meisten Treffer. Ab 100 Punkten ist sie frei."
  },
  ritt: {
    titel: "Präriereiter",
    ziel: "Sechs Städte, eine nach der anderen. Sammle genug Hufeisen, bevor du das Ortsschild erreichst.",
    steuerung: [
      "Links/rechts wischen oder tippen = Spur wechseln",
      "Nach oben wischen = springen",
      "Nach unten wischen = ducken",
      "Ab Stadt 2: oben ins Bild tippen = schiessen"
    ],
    punkte: [
      "Hufeisen: 10 · Goldsack: 50",
      "Geier: 75 · Bandit: 150",
      "Stadt erreicht: Bonus, wenn das Hufeisenziel steht"
    ],
    tipp: "Über Stämme, Zäune und Flüsse wird gesprungen, unter Ästen durchgeduckt. Felsen, Planwagen und Büffel lassen sich nur umfahren. Ab Stadt 3 schiessen Banditen zurück – wer zu spät zielt, verliert ein Herz."
  },
  saloon: {
    titel: "Saloon Brawl",
    ziel: "Du bist der Rausschmeißer. Beide Fäuste, Block, Konter – halte die betrunkenen Cowboys draußen.",
    steuerung: [
      "Links / rechts tippen = linke / rechte Faust",
      "Nach oben wischen = Kinnhaken (hoher Schaden, hebt den Gegner an)",
      "Beide Seiten gleichzeitig halten = Block · im letzten Moment = Konter",
      "Symbol links unten = Rundumschlag, lädt drei Sekunden",
      "Desktop: A / D = Fäuste · W = Kinnhaken · Leertaste = Block · Shift = Rundumschlag"
    ],
    punkte: [
      "Jeder erledigte Halunke zählt",
      "Schlagfolgen bilden Combos: Doppelschlag, Dreierserie, Finisher",
      "Höhere Combo bedeutet mehr Rückstoß – bis sie durch Fenster und Tür fliegen"
    ],
    tipp: "Getroffen wird dort, wo deine Faust wirklich ist – Kopftreffer wirken stärker als Rumpftreffer. Der Kinnhaken zielt aufs Kinn, die Gerade auf den Körper."
  },
  duell: {
    titel: "Schnelles Duell",
    ziel: "Fünf Runden gegen einen Revolvermann. Wer zuerst zieht, behält den Hut.",
    steuerung: [
      "Warten, bis ZIEH! erscheint",
      "Dann irgendwo tippen – so schnell du kannst",
      "Zu früh gezogen zählt als verloren"
    ],
    punkte: [
      "Gemessen wird die Reaktionszeit in Millisekunden",
      "Der Gegner braucht zwischen 260 und 440 ms",
      "In die Bestenliste geht deine schnellste Zeit"
    ],
    tipp: "Unter 250 Millisekunden ist sehr gut, unter 200 kaum zu schlagen. Wer auf das Signal lauert statt zu raten, ist am Ende schneller."
  }
};

function anleitungZeigen(id){
  const a = ANLEITUNG[id];
  if (!a) return;
  const o = vollbild("Anleitung", `<div id="tafel"></div>`);
  o.querySelector("#tafel").innerHTML = `<div class="tafelinhalt">
    <h2 style="margin-top:0">${a.titel}</h2>
    <p>${a.ziel}</p>
    <div class="gruppe">Steuerung</div>
    <ul class="regeln">${a.steuerung.map(z=>`<li>${z}</li>`).join("")}</ul>
    <div class="gruppe">Punkte</div>
    <ul class="regeln">${a.punkte.map(z=>`<li>${z}</li>`).join("")}</ul>
    <div class="gruppe">Tipp</div>
    <p>${a.tipp}</p>
    <button id="losbtn">Spiel starten</button>
  </div>`;
  o.querySelector("#losbtn").onclick = ()=>{
    /* iOS gibt die Bewegungssensoren nur frei, wenn die Abfrage unmittelbar
       aus einer Berührung der obersten Seite kommt – im eingebetteten Rahmen
       allein wird sie stillschweigend abgelehnt. */
    try{
      if (typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"){
        DeviceOrientationEvent.requestPermission().catch(()=>{});
      }
      if (typeof DeviceMotionEvent !== "undefined" &&
          typeof DeviceMotionEvent.requestPermission === "function"){
        DeviceMotionEvent.requestPermission().catch(()=>{});
      }
    }catch(e){}
    vollbildZu();
    const s = SPIELE.find(x=>x.id === id);
    if (s) s.start();
  };
}

let blobUrl = {};

  o.id = "vollbild";
  o.innerHTML = `<div class="leiste"><span>${titel}</span><button id="vbZu">Zurück</button></div>${innen}`;

  document.body.style.overflow = "hidden";
  o.querySelector("#vbZu").onclick = vollbildZu;
  return o;
}
function jagdErgebnisUebernehmen(){
  try{
    const liste = JSON.parse(localStorage.getItem("bj_scores") || "[]");
    if (!liste.length) return;
    const best = liste.reduce((a,b)=> (b.score||0) > (a.score||0) ? b : a);
    if (best && best.score > 0) eintragen("jagd", best.score);
  }catch(e){}
}
function vollbildZu(){
  const o = document.getElementById("vollbild");
  if (o && o.querySelector("#rahmen")) jagdErgebnisUebernehmen();
  if (o) o.remove();
  document.body.style.overflow = "";
  if (duellTakt){ clearTimeout(duellTakt); duellTakt = null; }
  if (typeof D === "object" && D && D.pulsTakt){ clearTimeout(D.pulsTakt); D.pulsTakt = null; }
}

function spielCode(id){
  const el = document.getElementById("code_" + id);
  if (!el) return null;
  try{
    const b64 = el.textContent.replace(/\s+/g, "");
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    return new TextDecoder("utf-8").decode(bytes);
  }catch(e){ return null; }
}

function spielRahmen(id){
  const code = spielCode(id);
  if (!code) return;
  let o;
  if (id === "ritt"){
    // Der Präriereiter bringt seine eigene Oberfläche mit – nur ein dezentes × zum Beenden
    o = document.createElement("div");
    o.id = "vollbild";
    o.innerHTML = `<button id="vbZu" class="nurX" aria-label="Beenden">×</button>
      <iframe id="rahmen" allow="autoplay; fullscreen; gyroscope; accelerometer; magnetometer" allowfullscreen scrolling="no"></iframe>`;
    document.body.appendChild(o);
    document.body.style.overflow = "hidden";
    o.querySelector("#vbZu").onclick = vollbildZu;
  } else {
    o = vollbild("Banditen-Jagd", `<iframe id="rahmen" allow="autoplay; fullscreen; gyroscope; accelerometer; magnetometer" allowfullscreen scrolling="no"></iframe>`);
  }
  const rahmen = o.querySelector("#rahmen");
  let geladen = false;
  rahmen.addEventListener("load", ()=> geladen = true);
  try { rahmen.srcdoc = code; } catch(e){}
  setTimeout(()=>{
    if (geladen || !document.body.contains(rahmen)) return;
    try{
      blobUrl[id] = blobUrl[id] || URL.createObjectURL(new Blob([code], {type:"text/html"}));
      rahmen.removeAttribute("srcdoc"); rahmen.src = blobUrl[id];
    }catch(e){}
  }, 2500);
}

window.addEventListener("message", (ev)=>{
  const d = ev.data;
  if (!d || d.typ !== "dg-ergebnis") return;
  const spiel = d.spiel || "jagd";

});

/* ---------- Kurze, trockene Klänge. Bewusst KEIN gehaltenes Rauschen:
   alles unter 80 ms Abklingzeit, sonst klingt es nach Wind. ---------- */
let duellHall = null;
function duellCtx(){
  if (!duellHall) duellHall = new (window.AudioContext || window.webkitAudioContext)();
  if (duellHall.state === "suspended") duellHall.resume();
  return duellHall;
}
function knall(){
  try{
    const a = duellCtx(), t = a.currentTime;
    // Kern: sehr kurzer Rauschstoss mit steilem Abfall
    const len = Math.floor(a.sampleRate * 0.09);
    const buf = a.createBuffer(1, len, a.sampleRate), d = buf.getChannelData(0);
    for (let n = 0; n < len; n++) d[n] = (Math.random()*2-1) * Math.pow(1 - n/len, 4.5);
    const src = a.createBufferSource(); src.buffer = buf;
    const lp = a.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 2200;
    const g = a.createGain(); g.gain.value = 0.5;
    src.connect(lp); lp.connect(g); g.connect(a.destination); src.start(t);
    // Druckwelle darunter
    const o = a.createOscillator(); o.type = "sine";
    o.frequency.setValueAtTime(160, t);
    o.frequency.exponentialRampToValueAtTime(42, t + 0.13);
    const g2 = a.createGain();
    g2.gain.setValueAtTime(0.55, t);
    g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
    o.connect(g2); g2.connect(a.destination); o.start(t); o.stop(t + 0.18);
  }catch(e){}
}
function hahnSpannen(){
  try{
    const a = duellCtx(), t = a.currentTime;
    for (let i = 0; i < 2; i++){
      const w = t + i * 0.07;
      const len = Math.floor(a.sampleRate * 0.014);
      const buf = a.createBuffer(1, len, a.sampleRate), d = buf.getChannelData(0);
      for (let n = 0; n < len; n++) d[n] = (Math.random()*2-1) * Math.pow(1 - n/len, 2);
      const src = a.createBufferSource(); src.buffer = buf;
      const hp = a.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 3200;
      const g = a.createGain(); g.gain.value = 0.16;
      src.connect(hp); hp.connect(g); g.connect(a.destination); src.start(w);
    }
  }catch(e){}
}
function herzschlag(){
  try{
    const a = duellCtx(), t = a.currentTime;
    [0, 0.17].forEach((v, i) => {
      const o = a.createOscillator(); o.type = "sine";
      o.frequency.setValueAtTime(72, t + v);
      o.frequency.exponentialRampToValueAtTime(38, t + v + 0.1);
      const g = a.createGain();
      g.gain.setValueAtTime(i ? 0.16 : 0.24, t + v);
      g.gain.exponentialRampToValueAtTime(0.0001, t + v + 0.13);
      o.connect(g); g.connect(a.destination);
      o.start(t + v); o.stop(t + v + 0.15);
    });
  }catch(e){}
}

function duellStarten(){
  D = {runde:0, siege:0, beste:besteLesen(), bereit:false, start:0, marken:[]};
  vollbild("Schnelles Duell", `
    <div id="duellflaeche">
      ${duellSzene()}
      <div id="marken"><i></i><i></i><i></i><i></i><i></i></div>
      <div id="ruf">bereithalten …</div>
      <div id="stand"></div>
    </div>
    <div id="ende">
      <h2 id="endeTitel"></h2>
      <p id="endeText"></p>
      <button id="nochmal">Noch einmal</button>
    </div>`);
  duellRunde();
}

function duellRunde(){
  const flaeche = document.getElementById("duellflaeche");
  if (!flaeche) return;
  if (D.runde >= 5) return duellEnde();
  D.runde++;
  const ruf = document.getElementById("ruf"), stand = document.getElementById("stand");
  const marken = document.querySelectorAll("#marken i");
  flaeche.className = "";
  ruf.textContent = "bereithalten …";
  stand.textContent = `Runde ${D.runde} von 5` + (D.beste ? ` · beste ${D.beste} ms` : "");

  /* Der Gegner wird von Runde zu Runde schneller – vorher war er immer
     gleich flink, dadurch fühlten sich alle fünf Runden identisch an. */
  const gegnerZeit = 330 - D.runde * 26 + Math.random() * 130;
  D.bereit = false;

  hahnSpannen();
  // Anspannung: das Bild zieht heran, der Puls geht schneller
  setTimeout(()=>{ if (document.body.contains(flaeche)) flaeche.classList.add("warten"); }, 30);
  let puls = 640;
  const pulsSchlag = ()=>{
    if (!document.body.contains(flaeche) || D.bereit) return;
    herzschlag();
    puls = Math.max(300, puls - 42);
    D.pulsTakt = setTimeout(pulsSchlag, puls);
  };
  D.pulsTakt = setTimeout(pulsSchlag, 420);

  duellTakt = setTimeout(()=>{
    if (!document.body.contains(flaeche)) return;
    clearTimeout(D.pulsTakt);
    D.bereit = true; D.start = performance.now();
    flaeche.classList.remove("warten"); flaeche.classList.add("zieh");
    ruf.textContent = "ZIEH!";
    duellTakt = setTimeout(()=>{ if (document.body.contains(flaeche)) aufloesen(null); }, 1200);
  }, 1500 + Math.random() * 2500);

  flaeche.onclick = ()=>{
    if (!D.bereit){
      clearTimeout(duellTakt); clearTimeout(D.pulsTakt);
      flaeche.className = "frueh";
      ruf.textContent = "Zu früh gezogen.";
      duellTakt = setTimeout(duellRunde, 1400);
      return;
    }
    clearTimeout(duellTakt);
    aufloesen(Math.round(performance.now() - D.start));
  };

  function aufloesen(meine){
    D.bereit = false; flaeche.onclick = null;
    clearTimeout(D.pulsTakt);
    if (meine !== null && (D.beste === null || meine < D.beste)){
      D.beste = meine; besteSchreiben(meine);
    }
    const gewonnen = meine !== null && meine < gegnerZeit;
    // Waffe hoch, Mündungsfeuer, Knall
    flaeche.classList.add("gezogen", gewonnen ? "blitzA" : "blitzB");
    knall();
    setTimeout(()=>{
      if (!document.body.contains(flaeche)) return;
      flaeche.classList.remove("blitzA", "blitzB");
      flaeche.classList.add(gewonnen ? "gewonnen" : "verloren");
      if (gewonnen) flaeche.classList.add("hutAb");
    }, 90);

    if (gewonnen){
      D.siege++;
      if (marken[D.runde-1]) marken[D.runde-1].className = "sieg";
      ruf.textContent = `${meine} ms · getroffen`;
    } else {
      if (marken[D.runde-1]) marken[D.runde-1].className = "pech";
      ruf.textContent = meine === null ? "Zu langsam."
        : `${meine} ms · er war schneller (${Math.round(gegnerZeit)} ms)`;
    }
    duellTakt = setTimeout(duellRunde, 1900);
  }
}

function duellEnde(){
  const kasten = document.getElementById("ende");
  if (!kasten) return;
  document.getElementById("endeTitel").textContent = `${D.siege} von 5`;
  document.getElementById("endeText").textContent =
    (D.beste ? `Deine schnellste Hand: ${D.beste} ms. ` : "") +
    (D.siege >= 4 ? "Der Sheriff sucht Verstärkung." :
     D.siege >= 2 ? "Solide Hand." : "Übung schadet nie.");
  kasten.style.display = "flex";
  if (D.beste) eintragen("duell", D.beste);
  document.getElementById("nochmal").onclick = ()=>{
    kasten.style.display = "none";
    D.runde = 0; D.siege = 0;
    document.querySelectorAll("#marken i").forEach(m => m.className = "");
    duellRunde();
  };
}
</script>
